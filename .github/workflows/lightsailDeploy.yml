name: lightsailDeploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/donghyun95/teamspace-lightsail:latest .

      - name: Push Docker image
        run: |
          docker push ghcr.io/donghyun95/teamspace-lightsail:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem

      - name: Deploy on Lightsail
        run: |
          ssh -i ~/.ssh/lightsail.pem -o StrictHostKeyChecking=no ubuntu@${{ secrets.LIGHTSAIL_HOST }} "
            cd ~/app &&
            docker compose pull &&
            docker compose up -d &&
            docker image prune -a -f
          "
