name: Deploy to ECS

# main 브랜치에 코드가 올라올 때(Push) 실행하겠다는 뜻입니다.
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 깃허브에 있는 코드를 가상 컴퓨터로 가져옵니다.
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. AWS 자격 증명(열쇠)을 적용합니다.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2 # 본인이 사용하는 리전 (예: 서울)

      # 3. AWS ECR에 로그인합니다.
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. 도커 이미지를 빌드하고 ECR에 푸시(Push)합니다.
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: teamspace
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 5. ECS 서비스가 새로운 이미지를 사용하도록 갱신합니다.
      - name: Update Amazon ECS task definition and service
        run: |
          aws ecs update-service --cluster favorable-hippopotamus-akjx0r22 --service example1-service-x4nnv4qa --force-new-deployment
