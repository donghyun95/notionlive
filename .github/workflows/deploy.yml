name: Deploy to ECS

# master 브랜치에 push 되면 실행
on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    # GitHub가 제공하는 Ubuntu 서버에서 실행
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      # 1. 현재 GitHub 저장소 코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. AWS 로그인용 자격 증명 설정
      # GitHub Secrets에 저장한 AWS 키 사용
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::990678687582:role/gitOIDC
          aws-region: ap-northeast-2

      # 3. Amazon ECR 로그인
      # 이후 docker push 가능해짐
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Check AWS Identity
        run: aws sts get-caller-identity
      # 4. Docker 이미지 빌드 후 ECR 업로드
      - name: Build, tag, and push image to Amazon ECR
        env:
          # ECR 주소
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}

          # ECR Repository 이름
          ECR_REPOSITORY: teamspace

          # 이미지 태그를 현재 git commit sha로 사용
          # 예: 3f8a12c...
          IMAGE_TAG: ${{ github.sha }}

        run: |
          # 최종 이미지 주소 생성
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          echo "Build image: $IMAGE_URI"

          # Docker 이미지 빌드
          docker build -t $IMAGE_URI .

          # ECR에 업로드
          docker push $IMAGE_URI

      # 5. Terraform 설치
      # GitHub Actions 서버에는 terraform이 기본 설치가 아닐 수 있음
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 6. Terraform 실행
      # 새 Docker 이미지를 ECS에 반영
      - name: Terraform Apply
        working-directory: ./infra

        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: teamspace
          IMAGE_TAG: ${{ github.sha }}

        run: |
          # 이번 배포에 사용할 최종 Docker 이미지 주소
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          echo "Deploy image: $IMAGE_URI"

          # Terraform 초기화
          terraform init

          # Terraform 적용
          # container_image 변수에 새 이미지 주소 전달
          terraform apply -auto-approve \
            -var="container_image=$IMAGE_URI"
